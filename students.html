<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSLA App - Students</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; }
    header { background:#0077ff; color:#fff; padding:28px 20px; text-align:center; }
    header h1 { margin:0; font-size:28px; }
    header p { margin:8px 0 0; opacity:0.9; }

    .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { background:#fff; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.08); padding:18px; margin-bottom:16px; }

    .row { display:flex; gap:12px; flex-wrap:wrap; }
    label { font-size:12px; font-weight:700; display:block; margin-bottom:6px; }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d7dbe7;
      outline: none;
      font-size: 14px;
    }
    .col { flex: 1; min-width: 220px; }

    button {
      background:#0077ff; color:#fff; border:none; border-radius:10px;
      padding: 10px 14px; cursor:pointer; font-weight:700;
    }
    button:hover { filter: brightness(0.95); }

    .btn-secondary { background:#111827; }
    .btn-danger { background:#ef4444; }

    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding: 12px 10px; border-bottom: 1px solid #eef1f7; }
    th { font-size:12px; text-transform: uppercase; letter-spacing: .04em; color:#5b6475; }
    .muted { color:#5b6475; font-size: 13px; }

    .top-actions { display:flex; gap:10px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .pill { background:#eef4ff; color:#0b4fd6; padding:6px 10px; border-radius:999px; font-weight:700; font-size:12px; }
.stage-pill { color:#fff; }
.stage-1, .stage-2 { background:#ef4444; }   /* red */
.stage-3, .stage-4 { background:#f59e0b; }   /* orange */
.stage-5, .stage-6 { background:#10b981; }   /* green */
.stage-7, .stage-8 { background:#3b82f6; }   /* blue */
.stage-unassessed { background:#6b7280; }    /* grey */

.group-a { border-left:6px solid #ef4444; padding-left:10px; }
.group-b { border-left:6px solid #f59e0b; padding-left:10px; }
.group-c { border-left:6px solid #10b981; padding-left:10px; }
.group-d { border-left:6px solid #3b82f6; padding-left:10px; }
.group-u { border-left:6px solid #6b7280; padding-left:10px; }
    .search {
      max-width: 360px;
      flex: 1;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Students</h1>
    <p>Manage your class list </p>
  </header>

  <div class="wrap">

    <div class="card">
      <div class="top-actions">
        <div class="row" style="margin:0; flex:1;">
          <div class="col search">
            <label for="search">Search</label>
            <input id="search" placeholder="Type a name…" />
          </div>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
          <span class="pill" id="countPill">0 students</span>
          <button class="btn-secondary" onclick="goBack()">← Dashboard</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Add Student</h2>
      <p class="muted"></p>

      <div class="row">
        <div class="col">
          <label for="name">Student name</label>
          <input id="name" placeholder="e.g., Riley Thompson" />
        </div>

        <div class="col">
          <label for="year">Year level</label>
          <select id="year">
            <option value="Year 1">Year 1</option>
            <option value="Year 2">Year 2</option>
            <option value="Year 3">Year 3</option>
            <option value="Year 4">Year 4</option>
            <option value="Year 5" selected>Year 5</option>
            <option value="Year 6">Year 6</option>
          </select>
        </div>

        <div class="col" style="display:flex; align-items:flex-end;">
          <button onclick="addStudent()">Add</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Class List</h2>
      <div id="empty" class="muted">No students yet. Add one above.</div>

      <div style="overflow:auto;">
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th style="width:55%;">Name</th>
              <th style="width:25%;">Year</th>
              <th style="width:20%;">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn-secondary" onclick="exportJSON()">Export (.json)</button>
        <button class="btn-danger" onclick="clearAll()">Clear all</button>
      </div>
      <hr style="margin:16px 0; border:none; border-top:1px solid #eef1f7;">

<h2 style="margin-top:0;">Reading Groups</h2>
<p class="muted">Auto-generate groups from each student’s latest BSLA stage and show a teaching focus.</p>

<div class="row">
  <div class="col">
    <label for="defaultStage">Default stage (if no BSLA recorded yet)</label>
    <select id="defaultStage">
      <option value="Unassessed" selected>Unassessed</option>
      <option value="1">Stage 1</option>
      <option value="2">Stage 2</option>
      <option value="3">Stage 3</option>
      <option value="4">Stage 4</option>
      <option value="5">Stage 5</option>
      <option value="6">Stage 6</option>
      <option value="7">Stage 7</option>
      <option value="8">Stage 8</option>
    </select>
  </div>

  <div class="col" style="display:flex; align-items:flex-end;">
    <button onclick="generateGroups()">Generate reading groups</button>
  </div>
</div>

<div id="groupOutput" class="card" style="display:none; margin-top:12px;"></div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = "bsla_students_v1";

    function loadStudents() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveStudents(students) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
    }

    function setCount(n) {
      document.getElementById("countPill").textContent = `${n} student${n === 1 ? "" : "s"}`;
    }

    function render() {
      const search = document.getElementById("search").value.trim().toLowerCase();
      const students = loadStudents();

      const filtered = students.filter(s => s.name.toLowerCase().includes(search));

      const empty = document.getElementById("empty");
      const table = document.getElementById("table");
      const tbody = document.getElementById("tbody");

      setCount(students.length);

      tbody.innerHTML = "";

      if (filtered.length === 0) {
        table.style.display = "none";
        empty.style.display = "block";
        empty.textContent = students.length === 0 ? "No students yet. Add one above." : "No matches found.";
        return;
      }

      empty.style.display = "none";
      table.style.display = "table";

      filtered.forEach((s) => {
        const tr = document.createElement("tr");
       

tr.innerHTML = `
  <td>
    <strong>${escapeHtml(s.name)}</strong><br>
    
<span class="pill stage-pill ${s.bslaStage ? `stage-${escapeHtml(String(s.bslaStage))}` : 'stage-unassessed'}" style="font-size:12px;">
  ${s.bslaStage ? `Stage ${escapeHtml(String(s.bslaStage))}` : "Unassessed"}
</span>

  </td>

  <td>${escapeHtml(s.year)}</td>

  <td>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <select style="max-width:140px;" onchange="setStage('${s.id}', this.value)">
        <option value="">Set stage…</option>
        ${[1,2,3,4,5,6,7,8].map(n => `
          <option value="${n}" ${String(s.bslaStage)===String(n) ? "selected" : ""}>Stage ${n}</option>
        `).join("")}
      </select>

      <button class="btn-danger" onclick="removeStudent('${s.id}')">Delete</button>
    </div>
  </td>
`;

        tbody.appendChild(tr);
      });
    }

    function addStudent() {
      const nameEl = document.getElementById("name");
      const yearEl = document.getElementById("year");

      const name = nameEl.value.trim();
      const year = yearEl.value;

      if (!name) {
        alert("Please enter a student name.");
        nameEl.focus();
        return;
      }

      const students = loadStudents();
     

     students.push({
  id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
  name,
  year,
  bslaStage: null,     // stage number 1–8, or null if not set
  bslaNote: "",        // optional teacher note
  updatedAt: null,
  createdAt: new Date().toISOString(),
}); 

      saveStudents(students);

      nameEl.value = "";
      nameEl.focus();
      render();
    }

    function removeStudent(id) {
      const students = loadStudents().filter(s => s.id !== id);
      saveStudents(students);
      render();
    }

    function clearAll() {
      if (!confirm("Clear ALL students?")) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    }

    function exportJSON() {
      const students = loadStudents();
      const blob = new Blob([JSON.stringify(students, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "bsla-students.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function goBack() {
      // if your homepage is dashboard.html, this will take you back there
      window.location.href = "dashboard.html";
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[m]));
    }

    document.getElementById("search").addEventListener("input", render);
function setStage(id, value) {
  const students = loadStudents();
  const s = students.find(st => st.id === id);
  if (!s) return;

  s.bslaStage = value ? Number(value) : null;
  saveStudents(students);
  render();
}

function levelBand(stage) {
  const n = Number(stage);
  if (!stage || Number.isNaN(n)) return "Unassessed";
  if (n <= 2) return "Band A (Stages 1–2)";
  if (n <= 4) return "Band B (Stages 3–4)";
  if (n <= 6) return "Band C (Stages 5–6)";
  return "Band D (Stages 7–8)";
}

function teachingFocusForBand(band) {
  const focuses = {
    "Band A (Stages 1–2)": [
      "Phonemic awareness: segmenting and blending",
      "Letter–sound relationships",
      "Early decoding with decodable texts"
    ],
    "Band B (Stages 3–4)": [
      "Digraphs and vowel teams",
      "Blending for automaticity",
      "Supported repeated reading"
    ],
    "Band C (Stages 5–6)": [
      "Fluency: phrasing and expression",
      "Multisyllabic decoding",
      "Vocabulary development"
    ],
    "Band D (Stages 7–8)": [
      "Complex text fluency",
      "Morphology: prefixes and suffixes",
      "Comprehension strategies"
    ],
    "Unassessed": [
      "Run a quick BSLA assessment",
      "Check decoding accuracy",
      "Identify next teaching focus"
    ]
  };

  return focuses[band] || [];
}

function generateGroups() {

  const students = loadStudents();
  const groups = {};

  students.forEach(s => {
    const band = levelBand(s.bslaStage);

    if (!groups[band]) groups[band] = [];

    groups[band].push(s);
  });

  const container = document.getElementById("groupOutput");

  let html = "";

  Object.keys(groups).forEach(band => {

    const studentsList = groups[band]
      .map(s => `<li>${escapeHtml(s.name)} (${escapeHtml(s.year)})</li>`)
      .join("");

    const focus = teachingFocusForBand(band)
      .map(f => `<li class="muted">${escapeHtml(f)}</li>`)
      .join("");

    html += `
      <div style="margin-bottom:16px;">
        <span class="pill">${escapeHtml(band)}</span>

        <div class="muted" style="margin-top:8px;"><strong>Teaching Focus</strong></div>
        <ul>${focus}</ul>

        <div class="muted"><strong>Students</strong></div>
        <ul>${studentsList}</ul>
      </div>
    `;
  });

  container.style.display = "block";
  container.innerHTML = html;
}
    render();
  </script>
</body>
</html>
